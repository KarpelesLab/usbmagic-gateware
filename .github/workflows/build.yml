name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  bitstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build toolchain image
        run: docker build -t usbmagic-gateware:ci .

      - name: Build bitstreams
        run: |
          mkdir -p build
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            usbmagic-gateware:ci python3 build.py --design blinky --name usbmagic-blinky
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            usbmagic-gateware:ci python3 build.py --design pd_bridge --name usbmagic-pd-bridge
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            usbmagic-gateware:ci python3 build.py --design usb_host --name usbmagic-usb-host

      - name: Show result
        run: ls -l build/*.bit

      - name: Upload bitstream artifacts
        uses: actions/upload-artifact@v4
        with:
          name: usbmagic-bitstreams
          path: build/*.bit
          if-no-files-found: error

      - name: Attach bitstream to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.bit
